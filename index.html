<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Dividend Tracker - 宇宙科技股息追蹤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
        }

        body {
            background: radial-gradient(circle at top right, #0d1127 0%, #020205 100%);
            color: #e0e0e0;
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100vh;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat;
            opacity: 0.5;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        .text-gradient {
            background: linear-gradient(135deg, #00f3ff, #bc13fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-neon {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-neon:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        input[type="number"] {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            color: var(--neon-blue);
            border-radius: 10px;
            padding: 5px 12px;
            width: 90px;
            text-align: center;
        }

        .loading-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="stars"></div>

    <div class="max-w-6xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="orbitron text-5xl font-bold text-gradient mb-4">NEBULA DIVIDEND</h1>
            <div id="status-tag" class="inline-flex items-center gap-2 px-4 py-1 rounded-full bg-white/5 border border-white/10 text-[10px] tracking-widest text-gray-400">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-ping"></span>
                SYSTEM ACTIVE
            </div>
        </header>

        <!-- 核心數據總覽 -->
        <div class="glass-card p-10 mb-12 relative overflow-hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 relative z-10">
                <div>
                    <h2 class="text-sm font-medium text-gray-400 tracking-widest mb-2 uppercase">預估年度股息收入</h2>
                    <div class="flex items-baseline gap-3">
                        <span class="text-6xl font-bold orbitron text-white" id="total-dividend">0</span>
                        <span class="text-xl text-neon-blue font-bold">TWD</span>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-6 border-l border-white/10 pl-8">
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase mb-1">平均月收入</p>
                        <p class="text-2xl orbitron" id="monthly-dividend">$0</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase mb-1">投資組合總市值</p>
                        <p class="text-2xl orbitron" id="total-market-value">$0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- ETF 卡片區 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="etf-grid">
            <!-- 0056 Card -->
            <div id="card-0056" class="glass-card p-8 flex flex-col gap-6">
                <div class="flex justify-between">
                    <div>
                        <h3 class="orbitron text-3xl font-bold">0056</h3>
                        <p class="text-xs text-cyan-400 tracking-widest mt-1">元大高股息</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-gray-500">REAL-TIME</p>
                        <p class="orbitron text-xl text-white" id="price-0056">---</p>
                    </div>
                </div>
                
                <div class="bg-black/30 rounded-2xl p-4 space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-400">持有張數</span>
                        <input type="number" id="holding-0056" value="0" min="0" onchange="saveAndCalc()">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-400">當前市值</span>
                        <span class="text-sm orbitron" id="market-0056">$0</span>
                    </div>
                </div>

                <div class="space-y-4 py-2">
                    <div class="flex justify-between border-b border-white/5 pb-2">
                        <span class="text-[10px] text-gray-500">最新除息 / 金額</span>
                        <span class="text-xs font-bold text-neon-blue" id="ex-0056">載入中...</span>
                    </div>
                    <div class="flex justify-between border-b border-white/5 pb-2">
                        <span class="text-[10px] text-gray-500">發放日期</span>
                        <span class="text-xs text-white" id="pay-0056">載入中...</span>
                    </div>
                </div>

                <button class="btn-neon w-full" onclick="addToCalendar('0056')">加入行事曆</button>
            </div>

            <!-- 00878 Card -->
            <div id="card-00878" class="glass-card p-8 flex flex-col gap-6">
                <div class="flex justify-between">
                    <div>
                        <h3 class="orbitron text-3xl font-bold">00878</h3>
                        <p class="text-xs text-purple-400 tracking-widest mt-1">國泰永續高股息</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-gray-500">REAL-TIME</p>
                        <p class="orbitron text-xl text-white" id="price-00878">---</p>
                    </div>
                </div>
                
                <div class="bg-black/30 rounded-2xl p-4 space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-400">持有張數</span>
                        <input type="number" id="holding-00878" value="0" min="0" onchange="saveAndCalc()">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-400">當前市值</span>
                        <span class="text-sm orbitron" id="market-00878">$0</span>
                    </div>
                </div>

                <div class="space-y-4 py-2">
                    <div class="flex justify-between border-b border-white/5 pb-2">
                        <span class="text-[10px] text-gray-500">最新除息 / 金額</span>
                        <span class="text-xs font-bold text-neon-blue" id="ex-00878">載入中...</span>
                    </div>
                    <div class="flex justify-between border-b border-white/5 pb-2">
                        <span class="text-[10px] text-gray-500">發放日期</span>
                        <span class="text-xs text-white" id="pay-00878">載入中...</span>
                    </div>
                </div>

                <button class="btn-neon w-full" onclick="addToCalendar('00878')">加入行事曆</button>
            </div>

            <!-- 00919 Card -->
            <div id="card-00919" class="glass-card p-8 flex flex-col gap-6">
                <div class="flex justify-between">
                    <div>
                        <h3 class="orbitron text-3xl font-bold">00919</h3>
                        <p class="text-xs text-pink-400 tracking-widest mt-1">群益台灣精選高息</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-gray-500">REAL-TIME</p>
                        <p class="orbitron text-xl text-white" id="price-00919">---</p>
                    </div>
                </div>
                
                <div class="bg-black/30 rounded-2xl p-4 space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-400">持有張數</span>
                        <input type="number" id="holding-00919" value="0" min="0" onchange="saveAndCalc()">
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-400">當前市值</span>
                        <span class="text-sm orbitron" id="market-00919">$0</span>
                    </div>
                </div>

                <div class="space-y-4 py-2">
                    <div class="flex justify-between border-b border-white/5 pb-2">
                        <span class="text-[10px] text-gray-500">最新除息 / 金額</span>
                        <span class="text-xs font-bold text-neon-blue" id="ex-00919">載入中...</span>
                    </div>
                    <div class="flex justify-between border-b border-white/5 pb-2">
                        <span class="text-[10px] text-gray-500">發放日期</span>
                        <span class="text-xs text-white" id="pay-00919">載入中...</span>
                    </div>
                </div>

                <button class="btn-neon w-full" onclick="addToCalendar('00919')">加入行事曆</button>
            </div>
        </div>
    </div>

    <script id="firebase-script">
        const apiKey = ""; 
        const etfs = ['0056', '00878', '00919'];
        let store = {
            '0056': { price: 0, annual: 0, ex: '', pay: '', current: 0 },
            '00878': { price: 0, annual: 0, ex: '', pay: '', current: 0 },
            '00919': { price: 0, annual: 0, ex: '', pay: '', current: 0 }
        };

        const fmt = (v) => new Intl.NumberFormat('zh-TW', { maximumFractionDigits: 2 }).format(v);

        async function syncData() {
            const statusTag = document.getElementById('status-tag');
            statusTag.innerHTML = `<span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span> SYNCING DATA...`;
            
            const prompt = `
                搜尋 0056, 00878, 00919 的即時股價、最近一次除息日期、發放日期、配息金額、以及最近四次的總配息金額。
                必須嚴格以 JSON 格式回覆，不要有其他文字：
                {
                    "0056": {"price": 40.5, "ex_date": "2024/04/18", "pay_date": "2024/05/15", "current_div": 0.79, "last_4_total": 2.5},
                    ...其餘兩支
                }
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        tools: [{ "google_search": {} }]
                    })
                });

                const resJson = await response.json();
                let rawText = resJson.candidates[0].content.parts[0].text;
                
                // 清理可能出現的 Markdown 標記
                const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error("Format Error");
                
                const data = JSON.parse(jsonMatch[0]);

                etfs.forEach(code => {
                    if (data[code]) {
                        store[code] = {
                            price: data[code].price,
                            annual: data[code].last_4_total,
                            ex: data[code].ex_date,
                            pay: data[code].pay_date,
                            current: data[code].current_div
                        };
                    }
                });

                saveAndCalc();
                statusTag.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500"></span> SYSTEM SYNCED`;
            } catch (err) {
                console.error(err);
                statusTag.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500"></span> SYNC FAILED - RETRYING`;
                setTimeout(syncData, 5000);
            }
        }

        function saveAndCalc() {
            const holdings = {};
            let totalDiv = 0;
            let totalMarket = 0;

            etfs.forEach(code => {
                const input = document.getElementById(`holding-${code}`);
                const h = parseFloat(input.value) || 0;
                holdings[code] = h;

                const s = store[code];
                const mv = h * 1000 * s.price;
                const div = h * 1000 * s.annual;

                totalDiv += div;
                totalMarket += mv;

                document.getElementById(`price-${code}`).textContent = s.price ? `$${s.price}` : '---';
                document.getElementById(`market-${code}`).textContent = `$${fmt(mv)}`;
                document.getElementById(`ex-${code}`).textContent = s.ex ? `${s.ex} / $${s.current}` : '載入中...';
                document.getElementById(`pay-${code}`).textContent = s.pay || '載入中...';
            });

            document.getElementById('total-dividend').textContent = fmt(totalDiv);
            document.getElementById('monthly-dividend').textContent = `$${fmt(totalDiv / 12)}`;
            document.getElementById('total-market-value').textContent = `$${fmt(totalMarket)}`;

            localStorage.setItem('etf_nebula_holdings', JSON.stringify(holdings));
        }

        function load() {
            const saved = localStorage.getItem('etf_nebula_holdings');
            if (saved) {
                const h = JSON.parse(saved);
                etfs.forEach(code => {
                    if (h[code]) document.getElementById(`holding-${code}`).value = h[code];
                });
            }
            syncData();
        }

        function addToCalendar(code) {
            const s = store[code];
            if (!s.ex) return;
            const dateStr = s.ex.replace(/\//g, '');
            const title = encodeURIComponent(`${code} 除息日 - $${s.current}`);
            const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dateStr}/${dateStr}&details=發放日:${s.pay}`;
            window.open(url, '_blank');
        }

        window.onload = load;
    </script>
</body>
</html>
